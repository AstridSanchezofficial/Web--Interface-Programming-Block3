<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournaments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="m-4">
    <main class="text-center">
        <h1 >Arcade Tournaments 2026</h1>
        <p>Welcome to the 2nd version of Vanier Arcade Tournaments</p>
    </main>
    
    <section id="tournaments-section">
        <h2>Tournaments</h2>
        <button id="load-btn">Load tournaments</button>
        <button id="clear-btn">Clear</button>
        <p id="status" class="alert alert-dark mt-3">Click the button to load the tournaments</p>
        <div id="tournaments-container"></div>
    </section>
  

    <section id="registration-section">
        <h2>Registrations</h2>
        <p id="registration-status" class="alert alert-dark mt-3">No registrations yet</p>
        <div id="registrations"></div>
        <div id="summary"></div>
    </section>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
