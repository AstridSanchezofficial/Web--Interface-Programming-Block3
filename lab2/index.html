<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main>
        <h1 class="text-left p-3">User & post Dashboard</h1>
        <p class="text-left mx-3">This page serves to load the first 5 users from an  API and displays the user's posts</p>
        <section id="input-section" class="d-flex my-4">
            <button id="load-users" class="mx-3 p-2 rounded bg-primary border border-primary-subtle text-light">Load users</button>
            <button id="clear-button" class="p-2 rounded bg-black border border-black text-light ">Clear users</button>
        </section>

        <section id="output-section">
            
            <div  id="status" class="container-fluid d-flex my-3 p-4 rounded bg-success-subtle text-success" role="status">
                <span id="spinner" class="spinner-grow d-none mx-2"></span>
                <span id="status-users" class="p-2" >Ready!</span>
                
                
            </div>

            <div id="users-container" class="container-fluid d-flex flex-row">
            </div>

        </section>
    </main>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
